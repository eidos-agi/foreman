name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        run: pytest

  build-verify:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build
        run: python -m build
      - name: Verify metadata
        run: twine check dist/*
      - name: Verify wheel installs
        run: |
          python -m venv /tmp/verify-wheel
          /tmp/verify-wheel/bin/pip install dist/*.whl
          /tmp/verify-wheel/bin/foreman --help
          printf '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}\n' | /tmp/verify-wheel/bin/foreman-mcp
      - name: Verify sdist installs
        run: |
          python -m venv /tmp/verify-sdist
          /tmp/verify-sdist/bin/pip install dist/*.tar.gz
          /tmp/verify-sdist/bin/foreman --help
